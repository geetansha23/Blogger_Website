<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In &mdash; BlogSphere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces&family=DM+Sans&display=swap" rel="stylesheet">

  <!-- ✅ FIXED PATH -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
  <div class="page-curtain" id="pageCurtain"></div>

  <div class="auth-container">

    <div class="auth-left">
      <div class="auth-bg"></div>

      <div class="auth-left-content">
        <a href="index.html" class="auth-logo">Blog<span>Sphere</span></a>

        <h2>Where ideas come alive.</h2>
        <p>Join thousands of writers sharing stories.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrap">

        <h2>Welcome back</h2>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password">
        </div>

        <button onclick="login()">Sign In</button>

        <p>Don't have an account?
          <a href="register.html">Register</a>
        </p>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
