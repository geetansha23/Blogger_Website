<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | BlogSphere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-layout">
    <div class="auth-visual">
      <div class="auth-visual-overlay"></div>
      <img
        src="https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1200&auto=format&fit=crop"
        alt="Writing workspace"
      />
      <div class="auth-visual-content">
        <span>Welcome Back</span>
        <h1>Continue your writing journey with BlogSphere.</h1>
        <p>Read stories, publish ideas, and manage your blog beautifully.</p>
      </div>
    </div>

    <div class="auth-form-area">
      <a href="index.html" class="auth-logo">BlogSphere</a>

      <div class="auth-form-card">
        <h2>Login</h2>
        <p>Access your account and continue writing.</p>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" />
        </div>

        <button class="btn btn-primary full-width" id="loginBtn" onclick="login()">Login</button>

        <p class="auth-switch">
          Don’t have an account?
          <a href="register.html">Create one</a>
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/auth.js"></script>
</body>
</html>
