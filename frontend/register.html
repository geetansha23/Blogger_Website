<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register | BlogSphere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body">
  <div class="auth-layout">
    <div class="auth-visual">
      <div class="auth-visual-overlay"></div>
      <img
        src="https://images.unsplash.com/photo-1517842645767-c639042777db?q=80&w=1200&auto=format&fit=crop"
        alt="Creative desk"
      />
      <div class="auth-visual-content">
        <span>Start Writing</span>
        <h1>Create your space and share stories that matter.</h1>
        <p>Join BlogSphere and publish your ideas in a clean, attractive interface.</p>
      </div>
    </div>

    <div class="auth-form-area">
      <a href="index.html" class="auth-logo">BlogSphere</a>

      <div class="auth-form-card">
        <h2>Create Account</h2>
        <p>Join the platform and start publishing stories.</p>

        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" placeholder="Enter your name" />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email" />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Create a password" />
        </div>

        <button class="btn btn-primary full-width" id="registerBtn" onclick="register()">Create Account</button>

        <p class="auth-switch">
          Already have an account?
          <a href="login.html">Login</a>
        </p>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/auth.js"></script>
</body>
</html>
