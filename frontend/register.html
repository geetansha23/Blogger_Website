<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — BlogSphere</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
  <div class="page-curtain" id="pageCurtain"></div>
  <div class="auth-container">
    <div class="auth-left">
      <div class="auth-left-inner">
        <a href="index.html" class="logo large">Blog<span>Sphere</span></a>
        <h2 class="auth-tagline">Your voice<br><em>deserves to</em><br>be heard.</h2>
        <p>Start writing today. No experience needed — just your story.</p>
      </div>
      <div class="auth-deco">
        <div class="deco-circle c1"></div>
        <div class="deco-circle c2"></div>
      </div>
    </div>
    <div class="auth-right">
      <div class="auth-form-wrap">
        <h2>Create account</h2>
        <p class="auth-sub">Join BlogSphere for free</p>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" placeholder="Your name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter') register()">
        </div>
        <button class="btn-primary full" onclick="register()" id="registerBtn"><span>Create Account</span></button>
        <p class="auth-switch">Already have an account? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <script src="js/auth.js"></script>
</body>
</html>
