<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account &mdash; BlogSphere</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces&family=DM+Sans&display=swap" rel="stylesheet">

  <!-- ✅ FIXED PATH -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="auth-page">
  <div class="auth-container">

    <div class="auth-left">
      <div class="auth-left-content">
        <a href="index.html" class="auth-logo">Blog<span>Sphere</span></a>

        <h2>Create your account</h2>
        <p>Start writing your stories today.</p>
      </div>
    </div>

    <div class="auth-right">
      <div class="auth-form-wrap">

        <h2>Register</h2>

        <div class="form-group">
          <label>Name</label>
          <input type="text" id="name">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email">
        </div>

        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password">
        </div>

        <button onclick="register()">Create Account</button>

        <p>Already have an account?
          <a href="login.html">Login</a>
        </p>

      </div>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
